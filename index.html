<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Structure with Classes</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #ececec;
            background-color: #121212; /* พื้นหลังเข้มตามภาพ */
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            color: #ffffff;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        /* ตกแต่งสีแยกตาม Class */
        .section-tech {
            color: #4db8ff; /* สีฟ้า */
        }

        .section-workflow {
            color: #57cc99; /* สีเขียว */
        }

        .section-mindset {
            color: #ffca3a; /* สีเหลือง */
        }

        ul, ol {
            margin-bottom: 30px;
        }

        li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <h1>Mastering Development Fundamentals</h1>

    <h2 class="section-tech">Core Technologies</h2>
    <ul>
        <li>Python</li>
        <li>SQL</li>
        <li>HTML/CSS</li>
    </ul>

    <h2 class="section-workflow">Data Science Workflow</h2>
    <ol>
        <li>Data Collection</li>
        <li>Cleaning and Preprocessing</li>
        <li>Model Training</li>
    </ol>

    <h2 class="section-mindset">Key Mindsets</h2>
    <ul>
        <li>Stoic discipline</li>
        <li>Strategic focus</li>
        <li>Continuous learning</li>
    </ul>

</body>
</html>
